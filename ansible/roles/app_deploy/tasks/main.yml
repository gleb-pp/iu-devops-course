- name: Log in to Docker Hub
  community.docker.docker_login:
    username: "{{ dockerhub_username }}"
    password: "{{ dockerhub_password }}"

- name: Set docker_image full name
  set_fact:
    docker_image_full: "{{ dockerhub_username }}/{{ app_name }}"

- name: Pull Docker image
  community.docker.docker_image:
    name: "{{ docker_image_full }}"
    tag: "{{ docker_image_tag }}"
    source: pull

- name: Stop existing container
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    state: stopped
  ignore_errors: yes

- name: Remove old container
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    state: absent
  ignore_errors: yes

- name: Run new container
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    image: "{{ docker_image_full }}:{{ docker_image_tag }}"
    state: started
    restart_policy: "{{ restart_policy }}"
    ports:
      - "{{ app_port }}:{{ app_port }}"
    env: "{{ env_vars }}"
  notify: Restart application container

- name: Wait for application to start
  wait_for:
    host: 127.0.0.1
    port: "{{ app_port }}"
    delay: 5
    timeout: 30

- name: Check health endpoint
  uri:
    url: "http://127.0.0.1:{{ app_port }}/health"
    status_code: 200