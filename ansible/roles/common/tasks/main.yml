- name: Install common packages
  block:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install essential packages
      apt:
        name: "{{ common_packages }}"
        state: present

  rescue:
    - name: Fix apt cache if failed
      command: apt-get update --fix-missing

  always:
    - name: Log completion of common package block
      file:
        path: /tmp/common_packages_done.log
        state: touch

  become: true
  tags:
    - packages
    - common

- name: User management
  block:
    - name: Set timezone
      timezone:
        name: "{{ timezone }}"

  become: true
  tags:
    - users
    - common
