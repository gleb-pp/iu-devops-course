apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp-prod
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/gleb-pp/iu-devops-course.git
    targetRevision: master
    path: k8s/mychart
    helm:
      valueFiles:
        - values-prod.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  syncPolicy: {}