apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp-dev
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/gleb-pp/iu-devops-course.git
    targetRevision: master
    path: k8s/mychart
    helm:
      valueFiles:
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
