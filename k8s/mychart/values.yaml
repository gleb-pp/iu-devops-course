replicaCount: 5

image:
  repository: glebpp/app_python
  tag: "1.0"

containerPort: 5000

service:
  type: NodePort
  port: 80

env:
  ENV: "production"
  VERSION: "v2"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

probes:
  readiness:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 5
  liveness:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 10

secrets:
  username: "admin"
  password: "12345"