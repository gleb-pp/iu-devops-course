apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Chart.Name }}

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: {{ .Chart.Name }}

  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "myapp-role"
        vault.hashicorp.com/agent-inject-secret-config.txt: "secret/data/myapp"
        vault.hashicorp.com/agent-inject-template-config.txt: |
          {{ "{{- with secret \"secret/data/myapp\" -}}" }}
          username={{ "{{ .Data.data.username }}" }}
          password={{ "{{ .Data.data.password }}" }}
          {{ "{{- end }}" }}

    spec:
      volumes:
        - name: config-volume
          configMap:
            name: {{ include "mychart.fullname" . }}-config

        - name: data-volume
          persistentVolumeClaim:
            claimName: {{ include "mychart.fullname" . }}-data

      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: {{ .Values.containerPort }}

          env:
            - name: ENV
              value: {{ .Values.env.ENV | quote }}
            - name: VERSION
              value: {{ .Values.env.VERSION | quote }}

          envFrom:
            - configMapRef:
                name: {{ include "mychart.fullname" . }}-env

          volumeMounts:
            - name: config-volume
              mountPath: /config

            - name: data-volume
              mountPath: /data

          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}

          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: {{ .Values.containerPort }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}

          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: {{ .Values.containerPort }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}

  strategy:
    blueGreen:
      activeService: {{ .Release.Name }}-active
      previewService: {{ .Release.Name }}-preview

      autoPromotionEnabled: false